name: CI/CD Pipeline to AWS Docker Swarm

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Backend
      run: |
        docker build -t pawarpr/medshop_backend:latest ./backend
        docker push pawarpr/medshop_backend:latest

    - name: Build and Push Frontend
      run: |
        docker build -t pawarpr/medshop_frontend:latest ./frontend
        docker push pawarpr/medshop_frontend:latest

    - name: Deploy to AWS EC2 Swarm Manager
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_EC2_IP }}
        username: ec2-user
        key: ${{ secrets.AWS_SSH_KEY }}
        script: |
          sudo -E docker service update --image pawarpr/medshop_backend:latest --force medshop_backend
          sudo -E docker service update --image pawarpr/medshop_frontend:latest --force medshop_frontend